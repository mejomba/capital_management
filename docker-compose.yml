services:
  db:
    image: postgres:16-alpine
    container_name: cm_db
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: cm
      POSTGRES_DB: cm
    ports:
      - "5432:5432"
    volumes:
      - cm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cm -d cm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cm_pgdata:
